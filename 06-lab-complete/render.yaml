services:
  - type: web
    name: day12-agent-chung-final
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: day12-agent-chung-final
      - key: APP_VERSION
        value: "1.0.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: day12-agent-redis
          property: connectionString

  - type: redis
    name: day12-agent-redis
    region: singapore
    plan: free
    maxmemoryPolicy: allkeys-lru
