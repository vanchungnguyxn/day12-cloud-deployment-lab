services:
  - type: web
    name: day12-agent-chung
    env: python
    plan: free
    rootDir: 03-cloud-deployment/railway
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: day12-agent-chung
      - key: PYTHON_VERSION
        value: 3.11.9